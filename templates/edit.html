<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>商品編集</title>

<style>
body {
    font-family: Arial;
    background:#f4f6f8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box {
    background:white;
    padding:30px;
    border-radius:15px;
    width:320px;
    text-align:center;
}

input, select {
    width:90%;
    padding:10px;
    margin:10px 0;
    font-size:18px;
}

button {
    width:100%;
    padding:12px;
    background:#27ae60;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
}

.back {
    background:#e74c3c;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="box">
<h2>商品編集</h2>

<form method="POST">
<input name="name" value="{{ product.name }}"><br>

<select name="category">
<option {% if product.category=='コーヒー豆' %}selected{% endif %}>コーヒー豆</option>
<option {% if product.category=='ドリンク材料' %}selected{% endif %}>ドリンク材料</option>
<option {% if product.category=='フード' %}selected{% endif %}>フード</option>
<option {% if product.category=='デザート' %}selected{% endif %}>デザート</option>
<option {% if product.category=='消耗品' %}selected{% endif %}>消耗品</option>
</select><br>

<input name="stock" type="number" value="{{ product.stock }}"><br>

<button type="submit">保存</button>
</form>

<a href="/"><button class="back">戻る</button></a>
</div>

</body>
</html>
