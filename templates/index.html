<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body { font-family: Arial; background:#f4f6f8; margin:0; }

/* ヘッダー */
.header {
    background:#2c3e50;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header-right {
    display:flex;
    gap:10px;
    align-items:center;
}

/* フィルター */
.filters {
    padding:10px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

input, select {
    padding:8px;
    font-size:16px;
}

/* ボタン */
.btn {
    padding:8px;
    border:none;
    border-radius:6px;
    color:white;
}

.add{background:green;}
.edit{background:blue;}
.delete{background:red;}
.plus{background:green;}
.minus{background:orange;}
.logout{background:#e74c3c;}

/* 在庫 */
.low{background:#fff0d6;}
.out{background:#ffd6d6;}

/* テーブル */
table {
    width:100%;
    background:white;
    border-collapse:collapse;
}

th,td {
    padding:10px;
    border-bottom:1px solid #ddd;
}
</style>
</head>

<body>

<div class="header">
<span>在庫管理</span>

<div class="header-right">
<span>{{ username }}</span>

<a href="/logout"
onclick="return confirm('本当にログアウトしますか？')"
class="btn logout">ログアウト</a>

</div>
</div>

<div class="filters">

<input id="search" placeholder="検索" onkeyup="filter()">

<select id="cat" onchange="filter()">
<option value="">カテゴリ</option>
<option>コーヒー豆</option>
<option>ドリンク材料</option>
<option>フード</option>
<option>デザート</option>
<option>消耗品</option>
</select>

<select id="stock" onchange="filter()">
<option value="">在庫</option>
<option value="low">残りわずか</option>
<option value="out">在庫切れ</option>
</select>

<a href="/add" class="btn add">商品追加</a>

</div>

<table>
<tr>
<th>商品名</th>
<th>ジャンル</th>
<th>在庫</th>
<th>削除・編集</th>
</tr>

{% for p in products %}
<tr
data-name="{{p.name}}"
data-cat="{{p.category}}"
data-stock="{{'out' if p.stock==0 else 'low' if p.stock<=4 else 'ok'}}"
class="{% if p.stock==0 %}out{% elif p.stock<=4 %}low{% endif %}">

<td>{{p.name}}</td>
<td>{{p.category}}</td>

<td>
<button class="btn minus" onclick="updateStock({{p.id}},-1)">－</button>
{{p.stock}}
<button class="btn plus" onclick="updateStock({{p.id}},1)">＋</button>
</td>

<td style="display:flex; gap:5px;">
<a href="/edit/{{p.id}}" class="btn edit">編集</a>

<a href="/delete/{{p.id}}"
onclick="return confirm('削除しますか？')"
class="btn delete">削除</a>
</td>

</tr>
{% endfor %}
</table>

<script>
function updateStock(id,c){
fetch("/update/"+id+"/"+c).then(()=>location.reload());
}

function filter(){
let k=document.getElementById("search").value.toLowerCase();
let c=document.getElementById("cat").value;
let s=document.getElementById("stock").value;

document.querySelectorAll("tr[data-name]").forEach(r=>{
let ok=r.dataset.name.toLowerCase().includes(k)
&&(c==""||r.dataset.cat==c)
&&(s==""||r.dataset.stock==s);
r.style.display=ok?"":"none";
});
}
</script>

</body>
</html>
